name: Merge Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish_preview:
    name: Publish Preview
    uses: frankhaugen/Workflows/.github/workflows/dotnet-publish-preview.yml@main
    secrets: inherit

  create_release:
    name: Create Major Release
    needs: publish_preview
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next major version
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            if (releases.data.length === 0) return 'v1.0.0';
            const tag = releases.data[0].tag_name.replace(/^v/, '');
            const major = parseInt(tag.split('.')[0]) + 1;
            return `v${major}.0.0`;
          result-encoding: string

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.releases.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.version.outputs.result }}',
              name: 'Release ${{ steps.version.outputs.result }}',
              draft: false,
              prerelease: false,
              generate_release_notes: true
            });
