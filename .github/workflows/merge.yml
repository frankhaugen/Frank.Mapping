name: Merge Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish_preview:
    name: Publish Preview
    uses: frankhaugen/Workflows/.github/workflows/dotnet-publish-preview.yml@main
    secrets: inherit

  create_release:
    name: Create Release and Publish to NuGet
    needs: publish_preview
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Determine next major version and create release
        id: release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let nextTag = 'v1.0.0';
            try {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 1
              });
              if (releases.length > 0) {
                const tag = releases[0].tag_name.replace(/^v/, '');
                const major = parseInt(tag.split('.')[0]) + 1;
                nextTag = `v${major}.0.0`;
              }
            } catch (_) {}
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: nextTag,
              name: `Release ${nextTag}`,
              draft: false,
              prerelease: false,
              generate_release_notes: true
            });
            core.setOutput('version', nextTag.replace(/^v/, ''));

      - name: Restore
        run: dotnet restore Frank.Mapping.slnx

      - name: Build
        run: dotnet build Frank.Mapping.slnx --configuration Release --no-restore

      - name: Pack
        run: dotnet pack Frank.Mapping.slnx --configuration Release --no-build --output ./nupkgs -p:Version=${{ steps.release.outputs.version }}

      - name: Get NuGet API key via trusted publishing
        id: nuget-auth
        run: |
          OIDC_TOKEN=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api.nuget.org" \
            | jq -r '.value')

          BODY=$(jq -n \
            --arg user "${{ github.repository_owner }}" \
            '{"username": $user, "tokenType": "ApiKey"}')

          RESPONSE=$(curl -sS \
            -X POST "https://www.nuget.org/api/v2/token" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHubActions/${{ github.run_id }}" \
            -d "$BODY")

          NUGET_KEY=$(echo "$RESPONSE" | jq -r '.apiKey')
          if [ -z "$NUGET_KEY" ] || [ "$NUGET_KEY" = "null" ]; then
            echo "Failed to get NuGet API key. Response: $RESPONSE"
            exit 1
          fi
          echo "::add-mask::$NUGET_KEY"
          echo "key=$NUGET_KEY" >> $GITHUB_OUTPUT

      - name: Push to NuGet.org
        run: dotnet nuget push "./nupkgs/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "${{ steps.nuget-auth.outputs.key }}" --skip-duplicate
