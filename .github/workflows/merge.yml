name: Merge Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish_preview:
    name: Publish Preview
    uses: frankhaugen/Workflows/.github/workflows/dotnet-publish-preview.yml@main
    secrets: inherit

  create_release:
    name: Create Major Release
    needs: publish_preview
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next major version and create release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let nextTag = 'v1.0.0';
            try {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 1
              });
              if (releases.length > 0) {
                const tag = releases[0].tag_name.replace(/^v/, '');
                const major = parseInt(tag.split('.')[0]) + 1;
                nextTag = `v${major}.0.0`;
              }
            } catch (_) {}
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: nextTag,
              name: `Release ${nextTag}`,
              draft: false,
              prerelease: false,
              generate_release_notes: true
            });
