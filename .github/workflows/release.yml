name: Release Workflow

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish_preview:
    name: Publish Preview
    uses: frankhaugen/Workflows/.github/workflows/dotnet-publish-preview.yml@main
    secrets: inherit

  create_release:
    name: Create Release and Publish to NuGet
    needs: publish_preview
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Determine next major version and create release
        id: release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let nextTag = 'v1.0.0';
            try {
              const { data: releases } = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 1
              });
              if (releases.length > 0) {
                const tag = releases[0].tag_name.replace(/^v/, '');
                const parts = tag.split('.');
                const major = parseInt(parts[0]);
                const minor = parseInt(parts[1] || '0') + 1;
                nextTag = `v${major}.${minor}.0`;
              }
            } catch (_) {}
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: nextTag,
              name: `Release ${nextTag}`,
              draft: false,
              prerelease: false,
              generate_release_notes: true
            });
            core.setOutput('version', nextTag.replace(/^v/, ''));

      - name: Restore
        run: dotnet restore Frank.Mapping.slnx

      - name: Build
        run: dotnet build Frank.Mapping.slnx --configuration Release --no-restore

      - name: Pack
        run: dotnet pack Frank.Mapping.slnx --configuration Release --no-build --output ./nupkgs -p:Version=${{ steps.release.outputs.version }}

      - name: NuGet login
        uses: NuGet/login@v1
        id: nuget-auth
        with:
          user: ${{ github.repository_owner }}

      - name: Push to NuGet.org
        run: dotnet nuget push "./nupkgs/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "${{ steps.nuget-auth.outputs.NUGET_API_KEY }}" --skip-duplicate
